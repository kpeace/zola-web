[package]
name = "zola-client"
version = "0.1.0"
edition = "2021"

[dependencies]
console_error_panic_hook = "0.1.7"
wasm-bindgen = "0.2.95"
tracing-wasm = "0.2"
web-sys = { version = "0.3.72", features = ["Window", "Document", "HtmlElement", "Text"] }
